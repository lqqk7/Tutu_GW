name: Build OpenWrt

on:
  schedule:
    - cron: '0 10 * * 5'  # 每周五 18:00 CST (UTC+8)
  workflow_dispatch:

permissions:
  contents: write

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: openwrt-24.10
  CONFIG_FILE: config/.config
  DIY_P1_SH: scripts/diy-part1.sh
  DIY_P2_SH: scripts/diy-part2.sh
  TZ: Asia/Shanghai
jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost /usr/share/swift /usr/local/.ghcup \
            /usr/lib/jvm /etc/mysql /etc/php
          sudo apt-get clean
          docker rmi $(docker images -q) 2>/dev/null || true
          df -h

      - name: Initialize build environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git \
            libncurses-dev libssl-dev python3-setuptools \
            rsync unzip zlib1g-dev file wget swig
          sudo timedatectl set-timezone "$TZ"
          df -h

      - name: Clone OpenWrt source
        run: |
          git clone --depth=1 --branch $REPO_BRANCH $REPO_URL openwrt
          echo "Source: $(git -C openwrt describe --tags --always)"

      - name: Run diy-part1.sh
        run: |
          chmod +x $DIY_P1_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P1_SH

      - name: Update feeds
        run: cd openwrt && ./scripts/feeds update -a

      - name: Install feeds
        run: cd openwrt && ./scripts/feeds install -a

      - name: Run diy-part2.sh
        run: |
          chmod +x $DIY_P2_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P2_SH

      - name: Stamp build version
        run: |
          BUILD_VER=$(date +'%Y%m%d%H%M%S')
          echo "BUILD_VER=${BUILD_VER}" >> $GITHUB_ENV
          mkdir -p openwrt/files/etc
          echo "${BUILD_VER}" > openwrt/files/etc/tutu_build_version

      - name: Load configuration
        run: |
          cp $CONFIG_FILE openwrt/.config
          cd openwrt && make defconfig

      - name: Download packages
        run: |
          cd openwrt
          make download -j8
          find dl -size -1024c -exec rm -f {} \;

      - name: Build firmware
        run: |
          cd openwrt
          echo "Building with $(nproc) cores"
          if ! make -j$(nproc); then
            echo "::error::Parallel build failed, retrying with single thread for verbose output"
            make -j1 V=s
          fi

      - name: Collect artifacts
        run: |
          mkdir -p firmware
          find openwrt/bin/targets/x86/64 \( -name "*combined*.img.gz" -o -name "*sysupgrade*.img.gz" \) -exec cp {} firmware/ \;
          cp openwrt/bin/targets/x86/64/sha256sums firmware/ 2>/dev/null || true
          # 生成 autoupdate 插件期望的命名格式：luci-openwrt-x86-64-{VERSION}-uefi-{6hash}.img.gz
          EFI_SRC=$(find openwrt/bin/targets/x86/64 -name "*squashfs-combined-efi.img.gz" | head -1)
          if [ -n "$EFI_SRC" ]; then
            HASH6=$(sha256sum "$EFI_SRC" | cut -c1-6)
            cp "$EFI_SRC" firmware/luci-openwrt-x86-64-${BUILD_VER}-uefi-${HASH6}.img.gz
          fi
          LEGACY_SRC=$(find openwrt/bin/targets/x86/64 -name "*squashfs-combined.img.gz" ! -name "*efi*" | head -1)
          if [ -n "$LEGACY_SRC" ]; then
            HASH6=$(sha256sum "$LEGACY_SRC" | cut -c1-6)
            cp "$LEGACY_SRC" firmware/luci-openwrt-x86-64-${BUILD_VER}-legacy-${HASH6}.img.gz
          fi
          ls -lh firmware/
          echo "BUILD_DATE=$(date +'%Y.%m.%d')" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ env.BUILD_VER }}
          name: "Tutu_GW v${{ env.BUILD_VER }}"
          files: firmware/*
          fail_on_unmatched_files: true
          body: |
            ## Tutu_GW OpenWrt x86_64

            **设备:** R86S
            **源码:** OpenWrt 24.10 官方
            **构建时间:** ${{ env.BUILD_DATE }}

            ### 网络预设
            - LAN: `192.168.5.1` / br-lan (eth0–eth3)
            - WAN: PPPoE / eth4.3961
            - 默认密码: 空

            ### 内置插件
            openclash · ddns-go · advancedplus · autoupdate · turboacc · vlmcsd · upnp
