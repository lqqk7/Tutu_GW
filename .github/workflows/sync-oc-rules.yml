name: Sync OC Rules

on:
  schedule:
    - cron: '45 20 * * 0'  # жҮЏе‘ЁдёЂ 04:45 CST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Sync upstream OpenClash rules
        run: python3 .github/scripts/sync-oc-upstream.py

      - name: Validate generated files
        run: |
          grep -q 'ruleset=рџ¤– AIжњҚеЉҰ' OC_Rules/Custom_Clash_Lite.ini
          grep -q 'ruleset=рџ–ЁпёЏ AD5Xе€‡з‰‡' OC_Rules/Custom_Clash_Lite.ini
          grep -q 'Encrypted_DNS_Domain.yaml' OC_Rules/Custom_Clash_Lite.ini
          grep -q 'clash_rule_base=.*OC_Rules/Custom_Clash_Base.yaml' OC_Rules/Custom_Clash_Lite.ini
          grep -Fq 'include_remarks=(?i)^(?:.*9929v3.*|(?=.*зңҺе›Ң)(?=.*е®¶е®Ң).*|в™»пёЏ и‡ҒеЉЁйЂ‰ж‹©|рџҺҮ е…Ёзђѓз›өиүһ|рџ‡ғрџ‡ё зңҺе›ҢиЉ‚з‚№)$' OC_Rules/Custom_Clash_Lite.ini
          grep -Fq 'custom_proxy_group=рџљЂ ж‰‹еЉЁйЂ‰ж‹©`select`[]в™»пёЏ и‡ҒеЉЁйЂ‰ж‹©`[]рџҺҮ е…Ёзђѓз›өиүһ`(?i)^(?:.*9929v3.*|(?=.*зңҺе›Ң)(?=.*е®¶е®Ң).*)$' OC_Rules/Custom_Clash_Lite.ini
          grep -Fq 'custom_proxy_group=рџ‡ғрџ‡ё зңҺе›ҢиЉ‚з‚№`select`(?i)^(?:.*9929v3.*|(?=.*зңҺе›Ң)(?=.*е®¶е®Ң).*)$' OC_Rules/Custom_Clash_Lite.ini
          grep -q 'custom_proxy_group=в™»пёЏ и‡ҒеЉЁйЂ‰ж‹©`url-test`.*9929v3' OC_Rules/Custom_Clash_Lite.ini
          grep -q 'respect-rules: true' OC_Rules/Custom_Clash_Base.yaml
          grep -q 'ipv6: false' OC_Rules/Custom_Clash_Base.yaml
          grep -q 'use-system-hosts: false' OC_Rules/Custom_Clash_Base.yaml
          grep -q 'https://cloudflare-dns.com/dns-query#рџљЂ ж‰‹еЉЁйЂ‰ж‹©' OC_Rules/Custom_Clash_Base.yaml
          grep -q 'https://dns.google/dns-query#рџљЂ ж‰‹еЉЁйЂ‰ж‹©' OC_Rules/Custom_Clash_Base.yaml
          grep -q 'https://dns.quad9.net/dns-query#рџљЂ ж‰‹еЉЁйЂ‰ж‹©' OC_Rules/Custom_Clash_Base.yaml
          ! grep -Eq 'nameserver-policy|geosite:private|^[[:space:]]*-[[:space:]]*system$' OC_Rules/Custom_Clash_Base.yaml
          ! grep -Eq '223\\.5\\.5\\.5|119\\.29\\.29\\.29|dns\\.alidns\\.com|doh\\.pub' OC_Rules/Custom_Clash_Base.yaml
          grep -q 'DOMAIN-SUFFIX,claude.ai' OC_Rules/rule/AI_Classical.yaml
          grep -q 'DOMAIN-SUFFIX,flashforge.com' OC_Rules/rule/AD5X_Classical.yaml
          ! grep -Eq 'рџ‡­рџ‡°|рџ‡Үрџ‡µ|рџ‡ёрџ‡¬|рџ‡әрџ‡ё|рџ‡°рџ‡·|й¦™жёҮиЉ‚з‚№|ж—Өжњ¬иЉ‚з‚№|ж–°еЉ еқҰиЉ‚з‚№|еЏ°ж№ңиЉ‚з‚№|йџ©е›ҢиЉ‚з‚№' OC_Rules/Custom_Clash_Lite.ini
          ! grep -q 'е…ЁйѓЁиЉ‚з‚№' OC_Rules/Custom_Clash_Lite.ini
          ! grep -Eiq 'е№үе‘Љ|еҺ»е№үе‘Љ|ж‹¦ж€Ғ|adblock|reject' OC_Rules/Custom_Clash_Lite.ini

      - name: Commit rules if changed
        run: |
          if git diff --quiet -- OC_Rules; then
            echo "No upstream OpenClash rule changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add OC_Rules
          git commit -m "chore: sync oc rule snapshot"
          git push
