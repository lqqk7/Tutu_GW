name: Sync OC Rules

on:
  schedule:
    - cron: '45 20 * * 0'  # 每周一 04:45 CST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Sync upstream OpenClash rules
        run: python3 .github/scripts/sync-oc-upstream.py

      - name: Validate generated files
        run: |
          grep -q 'ruleset=🤖 AI服务' OC_Rules/Custom_Clash_Lite.ini
          grep -q 'ruleset=🖨️ AD5X切片' OC_Rules/Custom_Clash_Lite.ini
          grep -q 'Encrypted_DNS_Domain.yaml' OC_Rules/Custom_Clash_Lite.ini
          grep -q 'clash_rule_base=.*OC_Rules/Custom_Clash_Base.yaml' OC_Rules/Custom_Clash_Lite.ini
          python3 .github/scripts/test_sync_oc_upstream.py
          grep -Fq 'include_remarks=(?i)^(?!.*(?:小白|cf加速|hy2|D美国5))(?:.*(?:9929v[34]|4837v2).*|(?=.*美国)(?=.*家宽).*|♻️ 自动选择|🎯 全球直连|🇺🇸 美国节点)$' OC_Rules/Custom_Clash_Lite.ini
          grep -Fq 'custom_proxy_group=🚀 手动选择`select`[]♻️ 自动选择`[]🎯 全球直连`(?i)^(?!.*(?:小白|cf加速|hy2|D美国5))(?:.*(?:9929v[34]|4837v2).*|(?=.*美国)(?=.*家宽).*)$' OC_Rules/Custom_Clash_Lite.ini
          grep -Fq 'custom_proxy_group=🇺🇸 美国节点`select`(?i)^(?!.*(?:小白|cf加速|hy2|D美国5))(?:.*(?:9929v[34]|4837v2).*|(?=.*美国)(?=.*家宽).*)$' OC_Rules/Custom_Clash_Lite.ini
          grep -Fq 'custom_proxy_group=♻️ 自动选择`url-test`(?i)^(?!.*(?:小白|cf加速|hy2|D美国5))(?:.*(?:9929v[34]|4837v2).*|(?=.*美国)(?=.*家宽).*)$`https://cp.cloudflare.com/generate_204`300,,50' OC_Rules/Custom_Clash_Lite.ini
          grep -q 'respect-rules: true' OC_Rules/Custom_Clash_Base.yaml
          grep -q 'ipv6: false' OC_Rules/Custom_Clash_Base.yaml
          grep -q 'use-system-hosts: false' OC_Rules/Custom_Clash_Base.yaml
          grep -q 'https://cloudflare-dns.com/dns-query#🚀 手动选择' OC_Rules/Custom_Clash_Base.yaml
          grep -q 'https://dns.google/dns-query#🚀 手动选择' OC_Rules/Custom_Clash_Base.yaml
          grep -q 'https://dns.quad9.net/dns-query#🚀 手动选择' OC_Rules/Custom_Clash_Base.yaml
          grep -q 'nameserver-policy:' OC_Rules/Custom_Clash_Base.yaml
          grep -q '"geosite:cn":' OC_Rules/Custom_Clash_Base.yaml
          grep -q 'https://dns.alidns.com/dns-query' OC_Rules/Custom_Clash_Base.yaml
          grep -q 'https://doh.pub/dns-query' OC_Rules/Custom_Clash_Base.yaml
          ! grep -Eq 'geosite:private|^[[:space:]]*-[[:space:]]*system$' OC_Rules/Custom_Clash_Base.yaml
          ! grep -Eq '223\\.5\\.5\\.5|119\\.29\\.29\\.29' OC_Rules/Custom_Clash_Base.yaml
          grep -q 'DOMAIN-SUFFIX,claude.ai' OC_Rules/rule/AI_Classical.yaml
          grep -q 'DOMAIN-SUFFIX,flashforge.com' OC_Rules/rule/AD5X_Classical.yaml
          ! grep -Eq '🇭🇰|🇯🇵|🇸🇬|🇼🇸|🇰🇷|香港节点|日本节点|新加坡节点|台湾节点|韩国节点' OC_Rules/Custom_Clash_Lite.ini
          ! grep -q '全部节点' OC_Rules/Custom_Clash_Lite.ini
          ! grep -Eiq '广告|去广告|拦截|adblock|reject' OC_Rules/Custom_Clash_Lite.ini

      - name: Commit rules if changed
        run: |
          if git diff --quiet -- OC_Rules; then
            echo "No upstream OpenClash rule changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add OC_Rules
          git commit -m "chore: sync oc rule snapshot"
          git push
