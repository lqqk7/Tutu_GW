mixed-port: 7893
allow-lan: true
mode: rule
log-level: info
ipv6: false
unified-delay: true
tcp-concurrent: true

profile:
  store-selected: true
  store-fake-ip: true

sniffer:
  enable: true
  override-destination: true
  sniff:
    TLS:
      ports:
        - 443
        - 8443
    HTTP:
      ports:
        - 80
        - 8080-8880
      override-destination: true
  skip-domain:
    - "+.apple.com"
    - "+.flashforge.com"
    - "+.fdmcloud.flashforge.com"
    - "+.voxelshare.com"
    - "+.netease.im"
    - "+.chatnos.com"
  parse-pure-ip: true
  force-dns-mapping: true

dns:
  enable: true
  cache-algorithm: arc
  use-hosts: true
  use-system-hosts: false
  listen: 0.0.0.0:7874
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "localhost.ptlogin2.qq.com"
    - "+.flashforge.com"
    - "+.fdmcloud.flashforge.com"
    - "+.voxelshare.com"
    - "+.netease.im"
    - "+.chatnos.com"
    - "geosite:cn"
  fake-ip-filter-mode: blacklist
  respect-rules: true
  default-nameserver:
    - tls://1.1.1.1:853
    - tls://8.8.8.8:853
  proxy-server-nameserver:
    - tls://1.1.1.1:853
    - tls://8.8.8.8:853
  nameserver:
    - https://cloudflare-dns.com/dns-query#🚀 手动选择
    - https://dns.google/dns-query#🚀 手动选择
    - https://dns.quad9.net/dns-query#🚀 手动选择
